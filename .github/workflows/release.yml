name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Run tests
        run: flutter test || true
        
      - name: Build APK
        run: flutter build apk --release --shrink

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/sshtool-${{ github.ref_name }}.apk

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Rename AAB
        run: |
          cp build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/sshtool-${{ github.ref_name }}.aab
        
      - name: Check for release notes
        id: check_notes
        run: |
          if [ -f "RELEASE-v${{ github.ref_name }}.md" ]; then
            echo "has_notes=true" >> $GITHUB_OUTPUT
          else
            echo "has_notes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/sshtool-${{ github.ref_name }}.apk
            build/app/outputs/bundle/release/sshtool-${{ github.ref_name }}.aab
          body_path: ${{ steps.check_notes.outputs.has_notes == 'true' && format('RELEASE-v{0}.md', github.ref_name) || '' }}
          body: ${{ steps.check_notes.outputs.has_notes == 'false' && format('Release {0}', github.ref_name) || '' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshtool-release-apk
          path: build/app/outputs/flutter-apk/sshtool-${{ github.ref_name }}.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshtool-release-aab
          path: build/app/outputs/bundle/release/sshtool-${{ github.ref_name }}.aab
