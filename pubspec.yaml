name: ssh_tool
description: SSH Android Manager - A powerful SSH client for Android
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  
  # 数据持久化
  shared_preferences: ^2.2.2
  
  # SSH连接
  dartssh2: ^2.0.0
  
  # UI组件
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # 图标和主题
  cupertino_icons: ^1.0.6
  flex_color_scheme: ^7.3.1
  
  # 工具类
  uuid: ^4.2.2
  intl: ^0.18.1
  path_provider: ^2.1.2
  
  # 加密
  encrypt: ^5.0.1
  pointycastle: ^3.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/
